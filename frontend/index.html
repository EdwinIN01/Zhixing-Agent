<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能路线规划助手</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ===== 全局重置 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      height: 100vh; overflow: hidden;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(102,126,234,0.5); border-radius: 4px; }

    .app-container {
      display: flex; height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    /* ===== 侧边栏 ===== */
    .sidebar {
      width: 280px; min-width: 280px;
      background: rgba(255,255,255,0.95);
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      padding: 20px; display: flex; flex-direction: column; z-index: 10;
    }
    .logo-section { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: white;
    }
    .logo-text {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .new-chat-btn {
      width: 100%; padding: 10px 18px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.2s; margin-bottom: 16px;
    }
    .new-chat-btn:hover { opacity: 0.9; }
    .tips-label {
      font-size: 12px; color: #909399;
      padding: 6px 0 10px; border-top: 1px solid #eee;
    }
    .tip-card {
      background: white; border: 1px solid #e4e7ed;
      border-radius: 8px; padding: 10px 14px;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: #303133;
      transition: all 0.2s; margin-bottom: 8px;
    }
    .tip-card:hover {
      transform: translateX(4px); border-color: #409eff;
      box-shadow: 0 2px 8px rgba(64,158,255,0.15);
    }
    .tip-card .icon { font-size: 16px; }
    .tip-card .label { color: #606266; }

    /* ===== 主区域 ===== */
    .main-content {
      flex: 1; display: flex; flex-direction: column;
      background: #f5f7fa; min-width: 0;
    }
    .chat-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; background: white;
      border-bottom: 1px solid #e4e7ed;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #67c23a; display: inline-block;
    }
    .header-title { font-size: 17px; font-weight: 600; color: #303133; }
    .header-right { display: flex; gap: 6px; }
    .btn-icon {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid #e4e7ed; background: white;
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .btn-icon:hover { border-color: #409eff; color: #409eff; }
    .btn-icon.active { background: #409eff; color: white; border-color: #409eff; }

    /* ===== 布局：地图 + 消息 ===== */
    .chat-body {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }
    .map-panel {
      flex-shrink: 0;
      height: 0; overflow: hidden; transition: height 0.3s ease;
      background: #e8eaed; position: relative;
    }
    .map-panel.visible { height: 380px; min-height: 200px; }
    .map-container { width: 100%; height: 100%; min-height: 200px; }
    .map-panel .resize-handle {
      position: absolute; bottom: 0; left: 0; right: 0; height: 6px;
      cursor: ns-resize; background: transparent; z-index: 10;
    }
    .map-panel .resize-handle:hover { background: rgba(102,126,234,0.3); }
    .map-panel .close-map {
      position: absolute; top: 8px; right: 8px; z-index: 10;
      width: 28px; height: 28px; border-radius: 50%;
      background: white; border: 1px solid #ddd;
      cursor: pointer; font-size: 14px; line-height: 26px; text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .map-panel .close-map:hover { background: #f56c6c; color: white; }
    .map-container { width: 100%; height: 100%; }
    .map-legend {
      position: absolute; bottom: 8px; left: 8px; z-index: 10;
      background: white; border-radius: 6px; padding: 6px 10px;
      font-size: 11px; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      display: flex; gap: 12px;
    }
    .map-legend span { display: flex; align-items: center; gap: 4px; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block;
    }
    .legend-dot.origin { background: #409eff; }
    .legend-dot.dest { background: #f56c6c; }
    .legend-line {
      width: 16px; height: 2px; display: inline-block;
    }
    .legend-line.r1 { background: #409eff; }
    .legend-line.r2 { background: #67c23a; }
    .legend-line.r3 { background: #e6a23c; }

    .messages-panel {
      flex: 1; min-height: 0; overflow: hidden; background: #f5f7fa; position: relative;
    }
    .messages-scroll {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: auto; padding: 20px;
    }

    .welcome-message {
      text-align: center; padding: 60px 20px;
    }
    .welcome-icon {
      font-size: 64px; margin-bottom: 16px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .welcome-message h2 { font-size: 24px; margin-bottom: 6px; color: #303133; }
    .welcome-message p { color: #909399; font-size: 14px; }

    /* ===== 消息气泡 ===== */
    .message-item {
      display: flex; gap: 10px; margin-bottom: 20px;
      animation: slideIn 0.3s ease-out;
    }
    .message-item.user { flex-direction: row-reverse; }
    .message-item.assistant { flex-direction: row; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .avatar.user { background: linear-gradient(135deg,#667eea,#764ba2); }
    .avatar.assistant { background: linear-gradient(135deg,#409eff,#67c23a); }
    .message-bubble { max-width: 72%; }
    .message-content {
      padding: 12px 16px; background: white;
      border-radius: 14px; border-bottom-left-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      line-height: 1.65; color: #303133; font-size: 14px;
    }
    .message-item.user .message-content {
      background: linear-gradient(135deg,#667eea,#764ba2);
      color: white; border-bottom-left-radius: 14px; border-bottom-right-radius: 4px;
    }
    .message-content p { margin: 5px 0; }
    .message-content code {
      background: rgba(0,0,0,0.08); padding: 2px 5px; border-radius: 4px; font-size: 0.9em;
    }
    .message-item.user .message-content code { background: rgba(255,255,255,0.2); }
    .message-content ul, .message-content ol { padding-left: 18px; margin: 5px 0; }
    .message-content li { margin: 2px 0; }
    .message-time {
      font-size: 11px; color: #909399; margin-top: 4px;
      display: flex; align-items: center; gap: 4px;
    }
    .message-item.user .message-time { justify-content: flex-end; }

    /* ===== 路线选择卡片 ===== */
    .route-selection-card {
      background: white; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px; overflow: hidden;
    }
    .route-selection-header {
      display: flex; align-items: center; gap: 6px;
      padding: 14px 18px; border-bottom: 1px solid #eee;
      font-weight: 600; color: #303133; font-size: 15px;
    }
    .route-list { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
    .route-card {
      background: #fafafa; border: 1px solid #e4e7ed;
      border-radius: 10px; padding: 12px 14px;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 12px;
    }
    .route-card:hover { border-color: #409eff; transform: translateX(3px); }
    .route-card.recommended { border-color: #67c23a; border-width: 2px; }
    .route-card.selected { border-color: #409eff; background: #ecf5ff; }
    .route-card .badge {
      background: #67c23a; color: white;
      font-size: 11px; padding: 2px 6px; border-radius: 8px; flex-shrink: 0;
    }
    .route-info { flex: 1; }
    .route-summary { font-size: 14px; font-weight: 600; color: #303133; margin-bottom: 4px; }
    .route-tags { display: flex; gap: 6px; }
    .tag {
      font-size: 11px; padding: 2px 8px; border-radius: 8px;
      background: #eef0f6; color: #606266;
    }
    .poi-card { flex: 1; }
    .poi-name { font-size: 14px; font-weight: 600; color: #303133; }
    .poi-addr { font-size: 12px; color: #909399; margin: 3px 0; }

    /* ===== 加载动画 ===== */
    .loading-message {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; color: #909399; font-size: 13px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #e4e7ed; border-top-color: #409eff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 底部输入区 ===== */
    .input-footer {
      background: white; border-top: 1px solid #e4e7ed; padding: 10px 20px;
    }
    .image-preview {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 8px; position: relative;
    }
    .image-preview img {
      width: 52px; height: 52px; object-fit: cover;
      border-radius: 6px; border: 1px solid #e4e7ed;
    }
    .image-preview .remove-btn {
      position: absolute; top: -4px; left: 40px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #f56c6c; color: white; border: none;
      cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
    }
    .input-row {
      display: flex; gap: 8px; align-items: flex-end;
    }
    .input-row textarea {
      flex: 1; padding: 8px 12px;
      border: 1px solid #e4e7ed; border-radius: 8px;
      font-size: 14px; font-family: inherit;
      resize: none; outline: none; line-height: 1.4;
      max-height: 100px; transition: border-color 0.2s;
    }
    .input-row textarea:focus { border-color: #409eff; }
    .send-btn {
      padding: 8px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer;
      transition: opacity 0.2s; white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .icon-btn {
      padding: 8px 12px;
      background: #fff;
      color: #606266; border: 1px solid #dcdfe6; border-radius: 8px;
      font-size: 13px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .icon-btn:hover {
      background: #ecf5ff; border-color: #409eff; color: #409eff;
    }

    /* ===== Markdown 表格 ===== */
    .message-content table {
      border-collapse: collapse; width: 100%; margin: 6px 0;
    }
    .message-content th, .message-content td {
      border: 1px solid #e4e7ed; padding: 4px 8px; text-align: left;
    }
    .message-content th { background: #f5f7fa; font-weight: 600; }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .message-bubble { max-width: 90%; }
      .map-panel.visible { height: 250px; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="logo-section">
        <div class="logo-icon">&#x1F5FA;</div>
        <span class="logo-text">智能路线规划</span>
      </div>
      <button class="new-chat-btn" onclick="startNewChat()">
        &#x271A; 新建对话
      </button>
      <div class="tips-label">&#x1F4A1; 快捷示例</div>
      <div class="tip-card" onclick="sendQuickMessage('从北京到上海怎么走最快')">
        <span class="icon">&#x1F697;</span>
        <span class="label">北京 &#8594; 上海</span>
      </div>
      <div class="tip-card" onclick="sendQuickMessage('天安门附近有什么好餐厅')">
        <span class="icon">&#x1F37D;</span>
        <span class="label">搜索周边 POI</span>
      </div>
      <div class="tip-card" onclick="sendQuickMessage('推荐一条从成都到重庆的自驾游路线')">
        <span class="icon">&#x1F4F8;</span>
        <span class="label">自驾游路线</span>
      </div>
    </aside>

    <!-- 主内容 -->
    <main class="main-content">
      <header class="chat-header">
        <div class="header-left">
          <span class="status-dot" id="statusDot"></span>
          <span class="header-title">路线规划助手</span>
        </div>
        <div class="header-right">
          <button class="btn-icon" id="mapToggleBtn" title="显示/隐藏地图" onclick="toggleMap()">&#x1F5FA;</button>
          <button class="btn-icon" title="上传图片" onclick="document.getElementById('imageInput').click()">&#x1F5BC;</button>
        </div>
      </header>

      <div class="chat-body">
        <!-- 地图面板 -->
        <div class="map-panel" id="mapPanel">
          <div class="close-map" onclick="hideMap()">&#x2715;</div>
          <div class="map-container" id="mapContainer"></div>
          <div class="map-legend" id="mapLegend" style="display:none;">
            <span><span class="legend-dot origin"></span> 起点</span>
            <span><span class="legend-dot dest"></span> 终点</span>
            <span><span class="legend-line r1"></span> 路线1</span>
            <span><span class="legend-line r2"></span> 路线2</span>
            <span><span class="legend-line r3"></span> 路线3</span>
          </div>
          <div class="resize-handle" id="resizeHandle"></div>
        </div>

        <!-- 消息面板 -->
        <div class="messages-panel">
          <div class="messages-scroll" id="messagesScroll">
            <div id="welcomeMessage" class="welcome-message">
              <div class="welcome-icon">&#x1F5FA;</div>
              <h2>欢迎使用智能路线规划助手</h2>
              <p>我可以帮您规划路线、搜索目的地、了解交通信息</p>
            </div>
            <div id="messageList"></div>
            <div id="routeSelection" style="display:none;" class="route-selection-card">
              <div class="route-selection-header" id="routeSelectionTitle">&#x1F50D; 请选择一条路线</div>
              <div class="route-list" id="routeList"></div>
            </div>
            <div id="loadingIndicator" class="loading-message" style="display:none;">
              <div class="spinner"></div>
              <span>正在思考中...</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 底部输入 -->
      <footer class="input-footer">
        <div class="image-preview" id="imagePreview" style="display:none;">
          <img id="previewImg" src="" alt="预览" />
          <button class="remove-btn" onclick="removeImage()">&#x2715;</button>
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />
        <div class="input-row">
          <button class="icon-btn" id="locBtn" onclick="getUserLocation()" title="获取当前位置">&#x1F4CD; 定位</button>
          <textarea id="chatInput" rows="1" placeholder="输入您的问题..." onkeydown="handleKeyDown(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#x27A4; 发送</button>
        </div>
      </footer>
    </main>
  </div>

  <!-- 高德地图 JS API（需配置有效 key 才加载） -->
  <script type="text/javascript">
    window.AMAP_JS_KEY = "";
  </script>
  <script type="text/javascript">
    (function() {
      var key = window.AMAP_JS_KEY || '';
      if (!key) {
        console.log('未配置高德地图 JS API Key，地图功能不可用');
        return;
      }
      var script = document.createElement('script');
      script.type = 'text/javascript';
      script.src = 'https://webapi.amap.com/maps?v=1.4.15&key=' + key;
      script.onerror = function() { console.warn('地图 JS 加载失败，地图功能不可用'); };
      document.head.appendChild(script);
    })();
  </script>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/history.js"></script>
  <script src="/static/js/map.js"></script>
  <script src="/static/js/chat.js"></script>

</body>
</html>
