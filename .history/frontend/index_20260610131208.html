<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能路线规划助手</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ===== 全局重置 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(102,126,234,0.5); border-radius: 4px; }

    /* ===== 布局 ===== */
    .app-container {
      display: flex;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    /* ===== 侧边栏 ===== */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: rgba(255,255,255,0.95);
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: white;
    }
    .logo-text {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .new-chat-btn {
      width: 100%; padding: 12px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 8px;
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.2s; margin-bottom: 20px;
    }
    .new-chat-btn:hover { opacity: 0.9; }
    .tips-label {
      font-size: 13px; color: #909399;
      padding: 8px 0 12px; border-top: 1px solid #eee;
    }
    .tip-card {
      background: white;
      border: 1px solid #e4e7ed;
      border-radius: 8px;
      padding: 12px 16px;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: #303133;
      transition: all 0.2s; margin-bottom: 10px;
    }
    .tip-card:hover {
      transform: translateX(4px);
      border-color: #409eff;
      box-shadow: 0 2px 8px rgba(64,158,255,0.15);
    }
    .tip-card .icon { font-size: 18px; }
    .tip-card .label { color: #606266; }

    /* ===== 主区域 ===== */
    .main-content {
      flex: 1;
      display: flex; flex-direction: column;
      background: #f5f7fa;
    }
    .chat-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px;
      background: white;
      border-bottom: 1px solid #e4e7ed;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #67c23a; display: inline-block;
    }
    .header-title { font-size: 18px; font-weight: 600; color: #303133; }
    .header-right { display: flex; gap: 8px; }
    .btn-icon {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid #e4e7ed; background: white;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .btn-icon:hover { border-color: #409eff; color: #409eff; }

    /* ===== 消息区域 ===== */
    .messages-container {
      flex: 1; overflow: hidden; background: #f5f7fa;
    }
    .messages-scroll {
      height: 100%; overflow-y: auto; padding: 24px;
    }
    .welcome-message {
      text-align: center; padding: 80px 20px;
    }
    .welcome-icon {
      font-size: 72px; margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .welcome-message h2 { font-size: 26px; margin-bottom: 8px; color: #303133; }
    .welcome-message p { color: #909399; font-size: 15px; }

    /* ===== 消息气泡 ===== */
    .message-item {
      display: flex; gap: 12px;
      margin-bottom: 24px;
      animation: slideIn 0.3s ease-out;
    }
    .message-item.user { flex-direction: row-reverse; }
    .message-item.assistant { flex-direction: row; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .avatar.user { background: linear-gradient(135deg,#667eea,#764ba2); }
    .avatar.assistant { background: linear-gradient(135deg,#409eff,#67c23a); }
    .message-bubble { max-width: 70%; }
    .message-content {
      padding: 14px 18px;
      background: white;
      border-radius: 16px; border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      line-height: 1.7; color: #303133;
      font-size: 14px;
    }
    .message-item.user .message-content {
      background: linear-gradient(135deg,#667eea,#764ba2);
      color: white;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 4px;
    }
    .message-content p { margin: 6px 0; }
    .message-content code {
      background: rgba(0,0,0,0.08);
      padding: 2px 6px; border-radius: 4px;
      font-size: 0.9em;
    }
    .message-item.user .message-content code { background: rgba(255,255,255,0.2); }
    .message-content ul, .message-content ol { padding-left: 20px; margin: 6px 0; }
    .message-content li { margin: 3px 0; }
    .message-time {
      font-size: 12px; color: #909399;
      margin-top: 6px; display: flex; align-items: center; gap: 4px;
    }
    .message-item.user .message-time { justify-content: flex-end; }

    /* ===== 加载动画 ===== */
    .loading-message {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; color: #909399; font-size: 14px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e4e7ed; border-top-color: #409eff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 路线选择卡片 ===== */
    .route-selection-card {
      background: white; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px; overflow: hidden;
    }
    .route-selection-header {
      display: flex; align-items: center; gap: 8px;
      padding: 16px 20px; border-bottom: 1px solid #eee;
      font-weight: 600; color: #303133;
    }
    .route-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .route-card {
      background: #fafafa; border: 1px solid #e4e7ed;
      border-radius: 10px; padding: 14px 16px;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 14px;
    }
    .route-card:hover { border-color: #409eff; transform: translateX(3px); }
    .route-card.recommended { border-color: #67c23a; border-width: 2px; }
    .route-card .badge {
      background: #67c23a; color: white;
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      flex-shrink: 0;
    }
    .route-info { flex: 1; }
    .route-summary { font-size: 15px; font-weight: 600; color: #303133; margin-bottom: 6px; }
    .route-tags { display: flex; gap: 8px; }
    .tag {
      font-size: 12px; padding: 2px 10px; border-radius: 10px;
      background: #eef0f6; color: #606266;
    }
    .poi-card { flex: 1; }
    .poi-name { font-size: 15px; font-weight: 600; color: #303133; }
    .poi-addr { font-size: 13px; color: #909399; margin: 4px 0; }

    /* ===== 底部输入区 ===== */
    .input-footer {
      background: white;
      border-top: 1px solid #e4e7ed;
      padding: 12px 24px;
    }
    .image-preview {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; position: relative;
    }
    .image-preview img {
      width: 60px; height: 60px; object-fit: cover;
      border-radius: 8px; border: 1px solid #e4e7ed;
    }
    .image-preview .remove-btn {
      position: absolute; top: -6px; left: 46px;
      width: 20px; height: 20px; border-radius: 50%;
      background: #f56c6c; color: white; border: none;
      cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
    }
    .input-row textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e4e7ed; border-radius: 8px;
      font-size: 14px; font-family: inherit;
      resize: none; outline: none; line-height: 1.5;
      max-height: 120px; transition: border-color 0.2s;
    }
    .input-row textarea:focus { border-color: #409eff; }
    .send-btn {
      padding: 10px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer;
      transition: opacity 0.2s; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== Markdown 表格 ===== */
    .message-content table {
      border-collapse: collapse; width: 100%; margin: 8px 0;
    }
    .message-content th, .message-content td {
      border: 1px solid #e4e7ed; padding: 6px 10px; text-align: left;
    }
    .message-content th { background: #f5f7fa; font-weight: 600; }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .message-bubble { max-width: 90%; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="logo-section">
        <div class="logo-icon">🗺️</div>
        <span class="logo-text">智能路线规划</span>
      </div>
      <button class="new-chat-btn" onclick="startNewChat()">
        ✚ 新建对话
      </button>
      <div class="tips-label">💡 快捷示例</div>
      <div class="tip-card" onclick="sendQuickMessage('从北京到上海怎么走最快')">
        <span class="icon">🚗</span>
        <span class="label">北京 → 上海</span>
      </div>
      <div class="tip-card" onclick="sendQuickMessage('天安门附近有什么好餐厅')">
        <span class="icon">🍽️</span>
        <span class="label">搜索周边 POI</span>
      </div>
      <div class="tip-card" onclick="sendQuickMessage('推荐一条从成都到重庆的自驾游路线')">
        <span class="icon">📸</span>
        <span class="label">自驾游路线</span>
      </div>
    </aside>

    <!-- 主内容 -->
    <main class="main-content">
      <header class="chat-header">
        <div class="header-left">
          <span class="status-dot" id="statusDot"></span>
          <span class="header-title">路线规划助手</span>
        </div>
        <div class="header-right">
          <button class="btn-icon" title="上传图片" onclick="document.getElementById('imageInput').click()">🖼️</button>
        </div>
      </header>

      <div class="messages-container">
        <div class="messages-scroll" id="messagesScroll">

          <!-- 欢迎消息 -->
          <div id="welcomeMessage" class="welcome-message">
            <div class="welcome-icon">🗺️</div>
            <h2>欢迎使用智能路线规划助手</h2>
            <p>我可以帮您规划路线、搜索目的地、了解交通信息</p>
          </div>

          <!-- 消息列表 -->
          <div id="messageList"></div>

          <!-- 路线选择 -->
          <div id="routeSelection" style="display:none;" class="route-selection-card">
            <div class="route-selection-header" id="routeSelectionTitle">🔍 请选择一条路线</div>
            <div class="route-list" id="routeList"></div>
          </div>

          <!-- 加载中 -->
          <div id="loadingIndicator" class="loading-message" style="display:none;">
            <div class="spinner"></div>
            <span>正在思考中...</span>
          </div>

        </div>
      </div>

      <!-- 底部输入 -->
      <footer class="input-footer">
        <div class="image-preview" id="imagePreview" style="display:none;">
          <img id="previewImg" src="" alt="预览" />
          <button class="remove-btn" onclick="removeImage()">✕</button>
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />
        <div class="input-row">
          <textarea id="chatInput" rows="1" placeholder="输入您的问题..." onkeydown="handleKeyDown(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            ➤ 发送
          </button>
        </div>
      </footer>
    </main>
  </div>

  <script>
    // ===== 状态 =====
    const state = {
      messages: [],
      sessionId: null,
      isLoading: false,
      selectedImage: null,
      routeSelection: null,
      assistantMsgIndex: -1,
      fullContent: ''
    };

    const $ = id => document.getElementById(id);
    const scrollToBottom = () => {
      const el = $('messagesScroll');
      setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
    };

    function getTime() {
      const d = new Date();
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }

    function formatDist(m) {
      if (!m) return '';
      return m >= 1000 ? (m/1000).toFixed(1)+' 公里' : m+' 米';
    }

    function formatDur(s) {
      if (!s) return '';
      const min = Math.floor(s/60);
      const h = Math.floor(min/60);
      return h > 0 ? h+' 小时 '+(min%60)+' 分钟' : min+' 分钟';
    }

    // ===== 消息渲染 =====
    function addMessage(role, content) {
      state.messages.push({ role, content: marked.parse(content), time: getTime() });
      renderMessages();
      scrollToBottom();
    }

    function updateLastMessage(content) {
      if (state.messages.length > 0) {
        state.messages[state.messages.length - 1].content = marked.parse(content);
        renderMessages();
        scrollToBottom();
      }
    }

    function renderMessages() {
      const list = $('messageList');
      list.innerHTML = state.messages.map(m => `
        <div class="message-item ${m.role}">
          <div class="avatar ${m.role}">${m.role === 'user' ? '👤' : '🤖'}</div>
          <div class="message-bubble">
            <div class="message-content">${m.content}</div>
            <div class="message-time">🕐 ${m.time}</div>
          </div>
        </div>
      `).join('');
    }

    // ===== 操作 =====
    function startNewChat() {
      state.messages = [];
      state.sessionId = null;
      state.selectedImage = null;
      state.routeSelection = null;
      $('messageList').innerHTML = '';
      $('welcomeMessage').style.display = 'block';
      $('routeSelection').style.display = 'none';
      $('chatInput').value = '';
      removeImage();
    }

    function sendQuickMessage(msg) {
      $('chatInput').value = msg;
      sendMessage();
    }

    function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        state.selectedImage = ev.target.result;
        $('previewImg').src = ev.target.result;
        $('imagePreview').style.display = 'flex';
      };
      reader.readAsDataURL(file);
    }

    function removeImage() {
      state.selectedImage = null;
      $('imagePreview').style.display = 'none';
      $('imageInput').value = '';
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    // ===== 路线选择渲染 =====
    function renderRouteSelection(data) {
      const container = $('routeSelection');
      const list = $('routeList');
      const title = $('routeSelectionTitle');
      title.innerHTML = `🔍 ${data.message || '请选择一条路线'}`;

      list.innerHTML = data.routes.map(r => {
        if (r.type === 'route') {
          return `
            <div class="route-card ${r.id === data.recommended_id ? 'recommended' : ''}" onclick="selectRoute('${r.id}')">
              <div class="route-info">
                <div class="route-summary">${r.summary || '路线'}</div>
                <div class="route-tags">
                  <span class="tag">🚗 ${formatDist(r.distance)}</span>
                  <span class="tag">⏱️ ${formatDur(r.duration)}</span>
                </div>
              </div>
              ${r.id === data.recommended_id ? '<span class="badge">推荐</span>' : ''}
            </div>
          `;
        } else {
          return `
            <div class="route-card" onclick="selectRoute('${r.id}')">
              <span style="font-size:28px;">📍</span>
              <div class="poi-card">
                <div class="poi-name">${r.name || ''}</div>
                <div class="poi-addr">${r.address || ''}</div>
                <div class="route-tags">
                  ${r.distance ? `<span class="tag">📏 ${formatDist(r.distance)}</span>` : ''}
                  ${r.rating ? `<span class="tag">⭐ ${r.rating}</span>` : ''}
                </div>
              </div>
            </div>
          `;
        }
      }).join('');

      container.style.display = 'block';
      scrollToBottom();
    }

    // ===== 选择路线 =====
    async function selectRoute(routeId) {
      if (!state.sessionId) return;
      state.isLoading = true;
      $('loadingIndicator').style.display = 'flex';
      $('routeSelection').style.display = 'none';

      try {
        const res = await fetch('/api/select-route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: state.sessionId, selected_route_id: routeId })
        });
        const data = await res.json();
        if (data.response) addMessage('assistant', data.response);
      } catch (err) {
        addMessage('assistant', `选择路线时出错: ${err.message}`);
      } finally {
        state.isLoading = false;
        $('loadingIndicator').style.display = 'none';
      }
    }

    // ===== 发送消息 =====
    async function sendMessage() {
      const input = $('chatInput');
      const query = input.value.trim();
      if (!query && !state.selectedImage) return;

      const imageBase64 = state.selectedImage ? state.selectedImage.split(',')[1] : null;

      addMessage('user', query || '[图片]');
      $('welcomeMessage').style.display = 'none';
      input.value = '';
      removeImage();

      state.isLoading = true;
      state.routeSelection = null;
      state.assistantMsgIndex = -1;
      state.fullContent = '';
      $('routeSelection').style.display = 'none';
      $('loadingIndicator').style.display = 'flex';
      $('sendBtn').disabled = true;

      try {
        const res = await fetch('/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_query: query, image_base64: imageBase64, session_id: state.sessionId })
        });

        if (!res.ok) throw new Error('请求失败(' + res.status + ')');

        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          while (buffer.includes('\n\n')) {
            const idx = buffer.indexOf('\n\n');
            const event = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);

            if (!event.startsWith('data: ')) continue;

            try {
              const data = JSON.parse(event.slice(6));

              if (data.type === 'stream') {
                state.fullContent += data.content;
                if (state.assistantMsgIndex === -1) {
                  state.messages.push({ role: 'assistant', content: marked.parse(state.fullContent), time: getTime() });
                  state.assistantMsgIndex = state.messages.length - 1;
                } else {
                  updateLastMessage(state.fullContent);
                }
              } else if (data.type === 'end') {
                if (data.session_id) state.sessionId = data.session_id;
                state.isLoading = false;
              } else if (data.type === 'pending_selection') {
                if (data.session_id) state.sessionId = data.session_id;
                state.routeSelection = data.data;
                addMessage('assistant', data.message);
                renderRouteSelection(data.data);
                state.isLoading = false;
              } else if (data.type === 'error') {
                addMessage('assistant', data.content);
                state.isLoading = false;
              }
            } catch (e) {
              console.error('解析失败:', e);
            }
          }
        }
      } catch (err) {
        addMessage('assistant', `抱歉，发生了错误: ${err.message}`);
      } finally {
        state.isLoading = false;
        $('loadingIndicator').style.display = 'none';
        $('sendBtn').disabled = false;
      }
    }
  </script>
</body>
</html>
